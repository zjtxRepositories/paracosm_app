<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f7f8fa">
  <title>Paracosm Invite</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f7f8fa;
      color: #15171a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      background:
        linear-gradient(rgba(21, 23, 26, .045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(21, 23, 26, .045) 1px, transparent 1px),
        #f7f8fa;
      background-size: 28px 28px;
    }

    .page {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(24px, env(safe-area-inset-top)) 20px max(24px, env(safe-area-inset-bottom));
    }

    .shell {
      width: min(430px, 100%);
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .brand-name {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .badge {
      padding: 8px 11px;
      border: 1px solid #e2e5eb;
      border-radius: 999px;
      background: rgba(255, 255, 255, .72);
      color: #5b6472;
      font-size: 12px;
      font-weight: 700;
    }

    .card {
      overflow: hidden;
      border: 1px solid #e2e5eb;
      border-radius: 22px;
      background: rgba(255, 255, 255, .94);
      box-shadow: 0 22px 58px rgba(17, 24, 39, .11);
    }

    .hero {
      padding: 28px 24px 22px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, .95), rgba(255, 255, 255, 0) 46%),
        linear-gradient(180deg, #ffffff, #f3f5f8);
      text-align: center;
    }

    .invite-icon {
      width: 78px;
      height: 68px;
      object-fit: contain;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 8vw, 38px);
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: 0;
    }

    .underline {
      display: inline-block;
      position: relative;
    }

    .underline::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 4px;
      height: 7px;
      background: #8dff42;
      z-index: -1;
    }

    .subtitle {
      margin: 12px auto 0;
      max-width: 300px;
      color: #5b6472;
      font-size: 14px;
      line-height: 1.65;
    }

    .body {
      padding: 22px 20px 20px;
    }

    .label {
      margin-bottom: 8px;
      color: #7a8492;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
    }

    .code {
      width: 100%;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px 16px;
      border: 1px solid #e2e5eb;
      border-radius: 14px;
      background: #f3f5f8;
      font-size: clamp(24px, 7vw, 32px);
      font-weight: 900;
      letter-spacing: .08em;
      line-height: 1.2;
      word-break: break-all;
    }

    .status {
      min-height: 20px;
      margin: 10px 0 18px;
      color: #7a8492;
      font-size: 12px;
      text-align: center;
    }

    .actions {
      display: grid;
      gap: 11px;
    }

    a,
    button {
      width: 100%;
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 15px 16px;
      font: inherit;
      font-size: 16px;
      font-weight: 800;
      line-height: 1.2;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .primary {
      background: #15171a;
      color: #fff;
    }

    .secondary {
      background: #eef1f5;
      color: #15171a;
    }

    .plain {
      background: transparent;
      color: #4b5563;
      border: 1px solid #e2e5eb;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 16px;
      color: #6b7280;
      font-size: 11px;
      text-align: center;
    }

    .step {
      padding: 10px 8px;
      border-radius: 12px;
      background: #f6f7f9;
    }

    .footnote {
      margin: 14px 4px 0;
      color: #8a93a1;
      font-size: 12px;
      line-height: 1.55;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="shell">
      <header class="brand">
        <div class="brand-name">PARACOSM</div>
        <div class="badge">Invite</div>
      </header>

      <section class="card">
        <div class="hero">
          <img class="invite-icon" src="/assets/images/profile/user/invite.png" alt="" onerror="this.style.display='none'">
          <h1>Welcome to <span class="underline">PARACOSM</span></h1>
          <p class="subtitle">你正在通过好友邀请加入。安装并打开 App 后，可使用下方邀请码完成绑定。</p>
        </div>

        <div class="body">
          <div class="label">邀请码</div>
          <div class="code" id="inviteCode">----</div>
          <div class="status" id="status">正在准备邀请信息...</div>

          <div class="actions">
            <button class="primary" id="openApp" type="button">打开 Paracosm</button>
            <a class="secondary" id="downloadApp" href="#">下载 App</a>
            <button class="plain" id="copyCode" type="button">复制邀请码</button>
          </div>

          <div class="steps" aria-hidden="true">
            <div class="step">打开链接</div>
            <div class="step">安装 App</div>
            <div class="step">自动绑定</div>
          </div>

          <p class="footnote">如果浏览器没有自动打开 App，请点击“打开 Paracosm”。未安装时请先下载，页面会把邀请码复制到剪贴板作为兜底。</p>
        </div>
      </section>
    </main>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = (params.get('code') || params.get('inviteCode') || '').trim();
    const codeNode = document.getElementById('inviteCode');
    const statusNode = document.getElementById('status');
    const openApp = document.getElementById('openApp');
    const downloadApp = document.getElementById('downloadApp');
    const copyCodeButton = document.getElementById('copyCode');
    const schemeUrl = `paracosm:///invite?code=${encodeURIComponent(code)}`;

    codeNode.textContent = code || '----';
    if (!code) {
      statusNode.textContent = '未检测到邀请码，请确认邀请链接是否完整。';
    }

    async function copyCode(showResult = false) {
      if (!code || !navigator.clipboard) {
        if (showResult) statusNode.textContent = '当前浏览器不支持自动复制，请手动选择邀请码复制。';
        return false;
      }
      try {
        await navigator.clipboard.writeText(code);
        statusNode.textContent = showResult ? '邀请码已复制' : '邀请码已准备好';
        return true;
      } catch (_) {
        if (showResult) statusNode.textContent = '复制失败，请手动选择邀请码复制。';
        return false;
      }
    }

    function isIOS() {
      return /iPhone|iPad|iPod/i.test(navigator.userAgent);
    }

    function isAndroid() {
      return /Android/i.test(navigator.userAgent);
    }

    function downloadUrl() {
      if (isIOS()) {
        return 'https://g.heiwuya.cn/3x5NEM';
      }
      if (isAndroid()) {
        return 'https://imapi.zjtxy.top/prod-api/im/channel/app/download/30';
      }
      return 'REPLACE_WITH_DOWNLOAD_PAGE_URL';
    }

    function openParacosm() {
      copyCode(false);
      if (!code) return;
      statusNode.textContent = '正在尝试打开 Paracosm...';
      window.location.href = schemeUrl;
      window.setTimeout(() => {
        statusNode.textContent = '如果未打开 App，请先下载安装。';
        window.location.href = downloadUrl();
      }, 1500);
    }

    openApp.addEventListener('click', openParacosm);
    copyCodeButton.addEventListener('click', () => copyCode(true));
    downloadApp.href = downloadUrl();
    copyCode(false);

    if (code) {
      window.setTimeout(openParacosm, 450);
    }
  </script>
</body>
</html>
